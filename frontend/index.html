<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI智能股票投资助手</title>
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }
        
        /* 主容器 */
        .app-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        /* 左侧会话列表 */
        .sessions-sidebar {
            width: 300px;
            background-color: #fff;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .sidebar-title {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
        }
        
        .new-session-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }
        
        .new-session-btn:hover {
            background-color: #2980b9;
        }
        
        .sessions-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        
        .session-item {
            padding: 15px;
            margin-bottom: 8px;
            background-color: #f8f9fa;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            border: 1px solid transparent;
        }
        
        .session-item:hover {
            background-color: #e9ecef;
        }
        
        .session-item.active {
            background-color: #3498db;
            color: white;
            border-color: #3498db;
        }
        
        .session-title {
            font-weight: 500;
            margin-bottom: 5px;
            font-size: 14px;
        }
        
        .session-time {
            font-size: 12px;
            opacity: 0.8;
        }
        
        /* 删除会话按钮样式 */
        .delete-session-btn {
            background-color: #f44336;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            float: right;
            margin-top: -30px;
            margin-right: 10px;
        }
        
        .delete-session-btn:hover {
            opacity: 1;
        }
        
        .session-item {
            position: relative;
        }
        
        /* 主内容区域 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* 大盘概览卡片 */
        .market-overview {
            background-color: #fff;
            padding: 10px;
            border-bottom: 1px solid #e0e0e0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 10px;
            overflow-y: auto;
            max-height: 350px;
        }
        
        /* 确保重要指数卡片有足够的高度用于纵向滚动 */
        .market-overview .index-scroll-card {
            min-height: 250px;
            overflow: hidden;
        }
        
        .overview-card {
            background-color: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            border-left: 4px solid #3498db;
            overflow: hidden;
        }
        
        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: #666;
            margin-bottom: 10px;
        }
        
        .card-content {
            font-size: 13px;
            color: #333;
            line-height: 1.5;
            overflow: hidden;
        }
        
        .scrollable-content {
            max-height: 180px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #3498db transparent;
        }
        
        .scrollable-content::-webkit-scrollbar {
            width: 6px;
        }
        
        .scrollable-content::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .scrollable-content::-webkit-scrollbar-thumb {
            background-color: #3498db;
            border-radius: 3px;
        }
        
        .index-info {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 5px;
            display: block;
            width: 100%;
            padding: 5px 0;
        }
        
        .change-positive {
            color: #27ae60;
        }
        
        .change-negative {
            color: #e74c3c;
        }
        
        /* 重要指数纵向滚动样式 */
        .index-scroll-card {
            overflow: hidden;
        }
        
        .index-scroll-content {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            gap: 10px;
            padding: 5px 0;
            scrollbar-width: thin;
            scrollbar-color: #3498db transparent;
            max-height: 250px;
            height: 100%;
        }
        
        .index-scroll-content::-webkit-scrollbar {
            width: 6px;
        }
        
        .index-scroll-content::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .index-scroll-content::-webkit-scrollbar-thumb {
            background-color: #3498db;
            border-radius: 3px;
        }
        
        .index-info {
            display: block;
            width: 100%;
            padding: 5px 10px;
            border-bottom: 1px solid #e0e0e0;
            font-size: 15px;
        }
        
        .index-info:last-child {
            border-bottom: none;
        }
        
        /* 聊天区域 */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #f5f7fa;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            position: relative;
        }
        
        .message.user {
            align-self: flex-end;
            background-color: #3498db;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.assistant {
            align-self: flex-start;
            background-color: #fff;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
        }
        
        .message-content {
            font-size: 14px;
        }
        
        .download-btn {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            margin-top: 10px;
            transition: background-color 0.2s;
        }
        
        .download-btn:hover {
            background-color: #229954;
        }
        
        /* 输入区域 */
        .chat-input-area {
            background-color: #fff;
            padding: 20px;
            border-top: 1px solid #e0e0e0;
        }
        
        .input-container {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 24px;
            resize: none;
            font-size: 14px;
            min-height: 48px;
            max-height: 120px;
            font-family: inherit;
        }
        
        .chat-input:focus {
            outline: none;
            border-color: #3498db;
        }
        
        .send-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 24px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
            white-space: nowrap;
        }
        
        .send-btn:hover {
            background-color: #2980b9;
        }
        
        .send-btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        
        /* 免责声明 */
        .disclaimer {
            padding: 10px 20px;
            background-color: #fff3cd;
            border-top: 1px solid #ffeaa7;
            font-size: 12px;
            color: #856404;
            text-align: center;
        }
        
        /* 加载状态 */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #666;
        }
        
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
            }
            
            .sessions-sidebar {
                width: 100%;
                height: 200px;
            }
            
            .market-overview {
                grid-template-columns: 1fr;
            }
            
            .message {
                max-width: 95%;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 左侧会话列表 -->
        <div class="sessions-sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">最近会话</div>
                <button class="new-session-btn" onclick="createNewSession()">新会话</button>
            </div>
            <div class="sessions-list" id="sessionsList">
                <!-- 会话列表将通过JavaScript动态加载 -->
            </div>
        </div>
        
        <!-- 主内容区域 -->
        <div class="main-content">
            <!-- 大盘概览卡片 -->
            <div class="market-overview" id="marketOverview">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <span>加载市场数据中...</span>
                </div>
            </div>
            
            <!-- 聊天区域 -->
            <div class="chat-container">
                <div class="chat-messages" id="chatMessages">
                    <!-- 聊天消息将通过JavaScript动态加载 -->
                </div>
                
                <!-- 输入区域 -->
                <div class="chat-input-area">
                    <div class="input-container">
                        <textarea 
                            class="chat-input" 
                            id="chatInput" 
                            placeholder="输入您的问题，例如：请分析股票 600519..."
                            rows="1"
                        ></textarea>
                        <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
                    </div>
                </div>
                
                <!-- 免责声明 -->
                <div class="disclaimer">
                    免责声明：本系统提供的投资建议仅供参考，不构成任何投资建议。投资有风险，入市需谨慎。
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 全局变量
        let currentSessionId = null;
        let marketData = null;
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', async () => {
            // 创建默认会话
            await createNewSession();
            
            // 加载市场概览
            loadMarketOverview();
            
            // 加载会话列表
            loadSessionsList();
            
            // 定时更新市场概览（每5分钟）
            setInterval(loadMarketOverview, 5 * 60 * 1000);
            
            // 监听输入框回车事件
            document.getElementById('chatInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            
            // 监听输入框高度变化
            document.getElementById('chatInput').addEventListener('input', autoResizeTextarea);
        });
        
        // 自动调整文本框高度
        function autoResizeTextarea() {
            const textarea = document.getElementById('chatInput');
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        }
        
        // 创建新会话
        async function createNewSession() {
            try {
                const response = await fetch('/api/sessions/new', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ title: '新会话' })
                });
                
                if (!response.ok) throw new Error('创建会话失败');
                
                const result = await response.json();
                currentSessionId = result.session_id;
                
                // 加载新会话
                loadSession(currentSessionId);
                
                // 更新会话列表
                loadSessionsList();
                
                // 清空输入框
                document.getElementById('chatInput').value = '';
                document.getElementById('chatInput').style.height = 'auto';
                
            } catch (error) {
                console.error('创建会话错误:', error);
                alert('创建会话失败，请稍后重试');
            }
        }
        
        // 删除会话
        async function deleteSession(sessionId) {
            try {
                if (sessionId === currentSessionId) {
                    // 如果删除的是当前会话，创建新会话
                    await createNewSession();
                }
                
                const response = await fetch(`/api/sessions/${sessionId}`, {
                    method: 'DELETE'
                });
                
                if (!response.ok) throw new Error('删除会话失败');
                
                // 更新会话列表
                await loadSessionsList();
                
            } catch (error) {
                console.error('删除会话错误:', error);
                alert('删除会话失败，请稍后重试');
            }
        }
        
        // 加载会话列表
        async function loadSessionsList() {
            try {
                const response = await fetch('/api/sessions?limit=15');
                if (!response.ok) throw new Error('获取会话列表失败');
                
                const sessions = await response.json();
                const sessionsList = document.getElementById('sessionsList');
                
                sessionsList.innerHTML = '';
                
                sessions.forEach(session => {
                    const sessionItem = document.createElement('div');
                    sessionItem.className = `session-item ${session.id === currentSessionId ? 'active' : ''}`;
                    
                    const sessionContent = document.createElement('div');
                    sessionContent.className = 'session-content';
                    sessionContent.onclick = () => loadSession(session.id);
                    
                    const title = document.createElement('div');
                    title.className = 'session-title';
                    title.textContent = session.title;
                    
                    const time = document.createElement('div');
                    time.className = 'session-time';
                    time.textContent = formatTime(session.updated_at);
                    
                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'delete-session-btn';
                    deleteBtn.textContent = '×';
                    deleteBtn.onclick = (e) => {
                        e.stopPropagation(); // 阻止事件冒泡
                        deleteSession(session.id);
                    };
                    
                    sessionContent.appendChild(title);
                    sessionContent.appendChild(time);
                    sessionItem.appendChild(sessionContent);
                    sessionItem.appendChild(deleteBtn);
                    sessionsList.appendChild(sessionItem);
                });
                
            } catch (error) {
                console.error('加载会话列表错误:', error);
            }
        }
        
        // 加载指定会话
        async function loadSession(sessionId) {
            try {
                currentSessionId = sessionId;
                
                // 更新会话列表选中状态
                document.querySelectorAll('.session-item').forEach(item => {
                    item.classList.remove('active');
                });
                event?.target?.closest('.session-item')?.classList.add('active');
                
                // 加载会话消息
                const response = await fetch(`/api/sessions/${sessionId}/messages`);
                if (!response.ok) throw new Error('获取会话消息失败');
                
                const messages = await response.json();
                const chatMessages = document.getElementById('chatMessages');
                
                chatMessages.innerHTML = '';
                
                messages.forEach(msg => {
                    addMessage(msg.role, msg.content);
                });
                
                // 滚动到底部
                scrollToBottom();
                
            } catch (error) {
                console.error('加载会话错误:', error);
                alert('加载会话失败，请稍后重试');
            }
        }
        
        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message || !currentSessionId) return;
            
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            sendBtn.textContent = '发送中...';
            
            // 添加用户消息到界面
            addMessage('user', message);
            
            // 清空输入框
            input.value = '';
            input.style.height = 'auto';
            
            // 滚动到底部
            scrollToBottom();
            
            try {
                // 发送请求到服务器
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        session_id: currentSessionId,
                        message: message
                    })
                });
                
                if (!response.ok) throw new Error('发送消息失败');
                
                const result = await response.json();
                
                // 添加助手消息到界面
                addMessage('assistant', result.message, result.report_id);
                
                // 滚动到底部
                scrollToBottom();
                
            } catch (error) {
                console.error('发送消息错误:', error);
                addMessage('assistant', '抱歉，处理您的请求时出现错误，请稍后重试。');
                scrollToBottom();
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = '发送';
            }
        }
        
        // 添加消息到聊天界面
        function addMessage(role, content, reportId = null) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;
            
            messageDiv.appendChild(contentDiv);
            
            // 如果有报告ID，添加下载按钮
            if (reportId && role === 'assistant') {
                const downloadBtn = document.createElement('button');
                downloadBtn.className = 'download-btn';
                downloadBtn.textContent = '下载投资报告';
                downloadBtn.onclick = () => downloadReport(reportId);
                messageDiv.appendChild(downloadBtn);
            }
            
            chatMessages.appendChild(messageDiv);
        }
        
        // 下载报告
        function downloadReport(reportId) {
            window.open(`/api/download/${reportId}`, '_blank');
        }
        
        // 加载市场概览
        async function loadMarketOverview() {
            try {
                console.log('开始加载市场概览数据...');
                const response = await fetch('/api/market/overview');
                console.log('API响应状态:', response.status, response.statusText);
                if (!response.ok) {
                    console.error('API响应错误:', response.status, response.statusText);
                    throw new Error('获取市场概览失败');
                }
                
                console.log('开始解析响应数据...');
                const data = await response.json();
                console.log('获取到的市场概览数据:', JSON.stringify(data, null, 2));
                marketData = data;
                
                console.log('开始渲染市场概览数据...');
                renderMarketOverview(data);
                
            } catch (error) {
                console.error('加载市场概览错误:', error);
                console.error('错误详情:', error.stack);
                document.getElementById('marketOverview').innerHTML = `
                    <div class="loading">
                        <span>加载市场数据失败，请稍后重试</span>
                    </div>
                `;
            }
        }
        
        // 渲染市场概览
        function renderMarketOverview(data) {
            const marketOverview = document.getElementById('marketOverview');
            
            // 只使用从后端获取的真实数据，不设置默认值
            const real_time = data.real_time || {};
            const shIndex = real_time.sh000001;
            const szIndex = real_time.sz399001;
            const analysis = data.analysis;
            
            marketOverview.innerHTML = `
                <!-- 重要指数 -->
                <div class="overview-card index-scroll-card">
                    <div class="card-title">重要指数</div>
                    <div class="card-content index-scroll-content">
                        <!-- 上证指数 -->
                        <div class="index-info">
                            ${shIndex?.名称 || '上证指数'}
                            <span class="${shIndex && shIndex.change_pct > 0 ? 'change-positive' : shIndex && shIndex.change_pct < 0 ? 'change-negative' : ''}">
                                ${shIndex ? ` ${shIndex.price.toFixed(2)} ${shIndex.change_pct > 0 ? '+' : ''}${shIndex.change_pct.toFixed(2)}%` : ' 暂无数据'}
                            </span>
                        </div>
                        
                        <!-- 深证成指 -->
                        <div class="index-info">
                            ${szIndex?.名称 || '深证成指'}
                            <span class="${szIndex && szIndex.change_pct > 0 ? 'change-positive' : szIndex && szIndex.change_pct < 0 ? 'change-negative' : ''}">
                                ${szIndex ? ` ${szIndex.price.toFixed(2)} ${szIndex.change_pct > 0 ? '+' : ''}${szIndex.change_pct.toFixed(2)}%` : ' 暂无数据'}
                            </span>
                        </div>
                        
                        <!-- 中证A股指数 -->
                        <div class="index-info">
                            ${real_time?.sh000002?.名称 || '中证A股指数'}
                            <span class="${real_time?.sh000002 && real_time.sh000002.change_pct > 0 ? 'change-positive' : real_time?.sh000002 && real_time.sh000002.change_pct < 0 ? 'change-negative' : ''}">
                                ${real_time?.sh000002 ? ` ${real_time.sh000002.price.toFixed(2)} ${real_time.sh000002.change_pct > 0 ? '+' : ''}${real_time.sh000002.change_pct.toFixed(2)}%` : ' 暂无数据'}
                            </span>
                        </div>
                        
                        <!-- 科创板指数 -->
                        <div class="index-info">
                            ${real_time?.sh000688?.名称 || '科创板指数'}
                            <span class="${real_time?.sh000688 && real_time.sh000688.change_pct > 0 ? 'change-positive' : real_time?.sh000688 && real_time.sh000688.change_pct < 0 ? 'change-negative' : ''}">
                                ${real_time?.sh000688 ? ` ${real_time.sh000688.price.toFixed(2)} ${real_time.sh000688.change_pct > 0 ? '+' : ''}${real_time.sh000688.change_pct.toFixed(2)}%` : ' 暂无数据'}
                            </span>
                        </div>
                        
                        <!-- 创业板指数 -->
                        <div class="index-info">
                            ${real_time?.sz399006?.名称 || '创业板指数'}
                            <span class="${real_time?.sz399006 && real_time.sz399006.change_pct > 0 ? 'change-positive' : real_time?.sz399006 && real_time.sz399006.change_pct < 0 ? 'change-negative' : ''}">
                                ${real_time?.sz399006 ? ` ${real_time.sz399006.price.toFixed(2)} ${real_time.sz399006.change_pct > 0 ? '+' : ''}${real_time.sz399006.change_pct.toFixed(2)}%` : ' 暂无数据'}
                            </span>
                        </div>
                        
                        <!-- 恒生指数 -->
                        <div class="index-info">
                            ${real_time?.hkHSI?.名称 || '恒生指数'}
                            <span class="${real_time?.hkHSI && real_time.hkHSI.change_pct > 0 ? 'change-positive' : real_time?.hkHSI && real_time.hkHSI.change_pct < 0 ? 'change-negative' : ''}">
                                ${real_time?.hkHSI ? ` ${real_time.hkHSI.price.toFixed(2)} ${real_time.hkHSI.change_pct > 0 ? '+' : ''}${real_time.hkHSI.change_pct.toFixed(2)}%` : ' 暂无数据'}
                            </span>
                        </div>
                        
                        <!-- 标普500指数 -->
                        <div class="index-info">
                            ${real_time?.usSPX?.名称 || '标普500指数'}
                            <span class="${real_time?.usSPX && real_time.usSPX.change_pct > 0 ? 'change-positive' : real_time?.usSPX && real_time.usSPX.change_pct < 0 ? 'change-negative' : ''}">
                                ${real_time?.usSPX ? ` ${real_time.usSPX.price.toFixed(2)} ${real_time.usSPX.change_pct > 0 ? '+' : ''}${real_time.usSPX.change_pct.toFixed(2)}%` : ' 暂无数据'}
                            </span>
                        </div>
                        
                        <!-- 道琼斯工业指数 -->
                        <div class="index-info">
                            ${real_time?.usDJI?.名称 || '道琼斯工业指数'}
                            <span class="${real_time?.usDJI && real_time.usDJI.change_pct > 0 ? 'change-positive' : real_time?.usDJI && real_time.usDJI.change_pct < 0 ? 'change-negative' : ''}">
                                ${real_time?.usDJI ? ` ${real_time.usDJI.price.toFixed(2)} ${real_time.usDJI.change_pct > 0 ? '+' : ''}${real_time.usDJI.change_pct.toFixed(2)}%` : ' 暂无数据'}
                            </span>
                        </div>
                        
                        <!-- 纳斯达克综合指数 -->
                        <div class="index-info">
                            ${real_time?.usIXIC?.名称 || '纳斯达克综合指数'}
                            <span class="${real_time?.usIXIC && real_time.usIXIC.change_pct > 0 ? 'change-positive' : real_time?.usIXIC && real_time.usIXIC.change_pct < 0 ? 'change-negative' : ''}">
                                ${real_time?.usIXIC ? ` ${real_time.usIXIC.price.toFixed(2)} ${real_time.usIXIC.change_pct > 0 ? '+' : ''}${real_time.usIXIC.change_pct.toFixed(2)}%` : ' 暂无数据'}
                            </span>
                        </div>

                        
                        <!-- 上海黄金交易所 Au(T+D) -->
                        ${(analysis?.gold_price && Array.isArray(analysis.gold_price) && analysis.gold_price.length > 0) ? 
                            (() => {
                                const auTd = analysis.gold_price.find(item => item.variety === 'Au(T+D)');
                                if (auTd) {
                                    return `
                                    <div class="index-info">
                                        Au(T+D)
                                        <span class="${auTd.change_rate && auTd.change_rate.startsWith('-') ? 'change-negative' : auTd.change_rate ? 'change-positive' : ''}">
                                            ${auTd.latest_price} ${auTd.change_rate}
                                        </span>
                                    </div>
                                    `;
                                }
                                return '';
                            })() : `
                            <div class="index-info">
                                Au(T+D)
                                <span> 暂无数据</span>
                            </div>
                            `}
                    </div>
                </div>
                
                <!-- 大盘综述 -->
                <div class="overview-card">
                    <div class="card-title">大盘综述</div>
                    <div class="card-content scrollable-content">
                        ${analysis?.market_summary || '暂无数据'}
                    </div>
                </div>
                
                <!-- 强势板块 -->
                <div class="overview-card">
                    <div class="card-title">强势板块</div>
                    <div class="card-content scrollable-content">
                        ${(analysis?.strong_sectors && Array.isArray(analysis.strong_sectors) && analysis.strong_sectors.length > 0) ? analysis.strong_sectors.map(sector => `- ${sector}`).join('<br>') : '暂无数据'}
                    </div>
                </div>
                
                <!-- 板块轮动 -->
                <div class="overview-card">
                    <div class="card-title">板块轮动</div>
                    <div class="card-content scrollable-content">
                        ${analysis?.rotation_analysis || '暂无数据'}
                    </div>
                </div>
                
                <!-- 明日预测 -->
                <div class="overview-card">
                    <div class="card-title">明日板块预测</div>
                    <div class="card-content scrollable-content">
                        ${analysis?.tomorrow_prediction || '暂无数据'}
                    </div>
                </div>
            `;
        }
        
        // 滚动到底部
        function scrollToBottom() {
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        // 格式化时间
        function formatTime(timestamp) {
            const date = new Date(timestamp * 1000);
            const now = new Date();
            const diff = now - date;
            
            // 小于1分钟
            if (diff < 60 * 1000) {
                return '刚刚';
            }
            // 小于1小时
            else if (diff < 60 * 60 * 1000) {
                return `${Math.floor(diff / (60 * 1000))}分钟前`;
            }
            // 小于24小时
            else if (diff < 24 * 60 * 60 * 1000) {
                return `${Math.floor(diff / (60 * 60 * 1000))}小时前`;
            }
            // 小于7天
            else if (diff < 7 * 24 * 60 * 60 * 1000) {
                return `${Math.floor(diff / (24 * 60 * 60 * 1000))}天前`;
            }
            // 更早
            else {
                return `${date.getMonth() + 1}月${date.getDate()}日`;
            }
        }
    </script>
</body>
</html>
